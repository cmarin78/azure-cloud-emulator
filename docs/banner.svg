<svg viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a2647"/>
      <stop offset="55%" stop-color="#0078d4"/>
      <stop offset="100%" stop-color="#003366"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef4fb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#50e6ff"/>
      <stop offset="100%" stop-color="#0078d4"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M0 36 L36 36 L36 0" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="4.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#dff3ff"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#001a33" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="1200" height="400" rx="22" fill="url(#bg)"/>
  <rect width="1200" height="400" rx="22" fill="url(#grid)"/>

  <!-- header -->
  <text x="48" y="64" fill="#ffffff" font-size="36" font-weight="700">Azure Emulator</text>
  <text x="48" y="92" fill="#cfe8ff" font-size="15">A portable, local, multi-service Azure emulator written in Go</text>

  <rect x="48" y="108" width="266" height="26" rx="13" fill="#ffffff" fill-opacity="0.12" stroke="#9fd3ff" stroke-width="1"/>
  <text x="181" y="125" text-anchor="middle" fill="#dff3ff" font-size="12" font-weight="600">18 phases &#183; 20+ Azure services</text>

  <!-- architecture row -->
  <g filter="url(#soft)">
    <rect x="48" y="160" width="168" height="64" rx="12" fill="url(#card)"/>
  </g>
  <text x="132" y="186" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">az CLI</text>
  <text x="132" y="204" text-anchor="middle" font-size="11" fill="#5f6368">Terraform &#183; SDKs</text>

  <path d="M220 192 L268 192" stroke="#dff3ff" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#soft)">
    <rect x="272" y="142" width="220" height="100" rx="12" fill="url(#card)"/>
  </g>
  <text x="382" y="168" text-anchor="middle" font-size="14" font-weight="700" fill="#1a1a2e">Go HTTP server</text>
  <text x="382" y="186" text-anchor="middle" font-size="10.5" fill="#5f6368">ARM-shaped REST API</text>
  <rect x="292" y="198" width="72" height="22" rx="6" fill="url(#accent)"/>
  <text x="328" y="213" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="600">Storage</text>
  <rect x="368" y="198" width="72" height="22" rx="6" fill="url(#accent)"/>
  <text x="404" y="213" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="600">Compute</text>
  <rect x="444" y="198" width="48" height="22" rx="6" fill="url(#accent)"/>
  <text x="468" y="213" text-anchor="middle" font-size="9.5" fill="#fff" font-weight="600">+18</text>

  <path d="M496 192 L544 192" stroke="#dff3ff" stroke-width="2" marker-end="url(#arrow)"/>

  <g filter="url(#soft)">
    <rect x="548" y="160" width="160" height="64" rx="12" fill="url(#card)"/>
  </g>
  <text x="628" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e">BoltDB</text>
  <text x="628" y="201" text-anchor="middle" font-size="10.5" fill="#5f6368">single embedded file</text>
  <text x="628" y="215" text-anchor="middle" font-size="10.5" fill="#5f6368">zero external deps</text>

  <!-- service breadth chips -->
  <text x="48" y="266" fill="#9fd3ff" font-size="11.5" font-weight="600" letter-spacing="0.5">SERVICES IMPLEMENTED</text>

  <g font-size="11" font-weight="600" fill="#0a2647">
    <rect x="48" y="276" width="87" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="91" y="292" text-anchor="middle">Key Vault</text>

    <rect x="151" y="276" width="94" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="198" y="292" text-anchor="middle">Networking</text>

    <rect x="261" y="276" width="60" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="291" y="292" text-anchor="middle">AKS</text>

    <rect x="337" y="276" width="101" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="387" y="292" text-anchor="middle">Service Bus</text>

    <rect x="454" y="276" width="87" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="497" y="292" text-anchor="middle">Cosmos DB</text>

    <rect x="557" y="276" width="101" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="607" y="292" text-anchor="middle">App Service</text>

    <rect x="674" y="276" width="87" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="717" y="292" text-anchor="middle">Functions</text>

    <rect x="777" y="276" width="129" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="841" y="292" text-anchor="middle">Entra ID &amp; RBAC</text>
  </g>

  <g font-size="11" font-weight="600" fill="#0a2647">
    <rect x="48" y="312" width="136" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="116" y="328" text-anchor="middle">Managed Identity</text>

    <rect x="200" y="312" width="94" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="247" y="328" text-anchor="middle">Event Grid</text>

    <rect x="310" y="312" width="94" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="357" y="328" text-anchor="middle">Event Hubs</text>

    <rect x="420" y="312" width="192" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="516" y="328" text-anchor="middle">Monitor &amp; Log Analytics</text>

    <rect x="628" y="312" width="122" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="689" y="328" text-anchor="middle">API Management</text>

    <rect x="766" y="312" width="101" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="816" y="328" text-anchor="middle">Web console</text>

    <rect x="883" y="312" width="206" height="24" rx="12" fill="#ffffff" fill-opacity="0.92"/>
    <text x="986" y="328" text-anchor="middle">az CLI &amp; Terraform tested</text>
  </g>

  <!-- footer strip -->
  <line x1="48" y1="350" x2="1152" y2="350" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <text x="48" y="374" fill="#cfe8ff" font-size="12">No Azure subscription required &#183; single binary, zero external deps</text>
  <text x="1152" y="374" text-anchor="end" fill="#7fb8e8" font-size="12" font-weight="600">github.com/cmarin78/azure-cloud-emulator</text>
</svg>
